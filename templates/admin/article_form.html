{% extends 'base.html' %}

{% block title %}{{ '编辑文章' if article else '新建文章' }} - 报价网站{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1>{{ '编辑文章' if article else '新建文章' }}</h1>
        <div class="header-actions">
            <a href="{{ url_for('admin.articles') }}" class="btn btn-secondary">返回列表</a>
        </div>
    </div>
    
    <div class="admin-content">
        <form method="POST" class="article-form">
            <div class="form-group">
                <label>文章标题</label>
                <input type="text" name="title" value="{{ article.title if article else '' }}" required>
            </div>
            
            <div class="form-group">
                <label>所属分类</label>
                <select name="category_id" required>
                    <option value="">请选择分类</option>
                    {% for category in categories %}
                    {% if category['name'] not in ['大件拒收邮编', '纸箱拒收邮编'] %}
                    <option value="{{ category['id'] }}" {% if article and article.category_id == category['id'] %}selected{% endif %}>
                        {{ category['name'] }}
                    </option>
                    {% endif %}
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ '保存' if article else '创建并编辑内容' }}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
