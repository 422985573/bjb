{% extends 'base.html' %}

{% block title %}大件/纸箱无服务邮编 - 报价网站{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <h1>大件/纸箱无服务邮编</h1>
        <div class="header-actions">
            <a href="{{ url_for('admin.articles') }}" class="btn btn-secondary">返回文章管理</a>
        </div>
    </div>
    
    <div class="admin-content">
        <p class="section-desc">以下邮编在查询时将提示「无服务」。多个邮编请用英文逗号或换行隔开，如：2330,2340,2357</p>
        
        <div class="section">
            <h2>大件 无服务邮编</h2>
            <textarea id="postcodes-dajian" class="postcodes-textarea" placeholder="2330,2340,2357,2400,...">{{ data.get('大件', '') }}</textarea>
        </div>
        
        <div class="section">
            <h2>纸箱 无服务邮编</h2>
            <textarea id="postcodes-zhixiang" class="postcodes-textarea" placeholder="2627,2628,2629,...">{{ data.get('纸箱', '') }}</textarea>
        </div>
        
        <div class="section">
            <button type="button" class="btn btn-primary" onclick="saveChannelPostcodes()">保存</button>
            <span id="saveStatus" class="save-status"></span>
        </div>
    </div>
</div>

<style>
.postcodes-textarea {
    width: 100%;
    min-height: 280px;
    padding: 12px;
    font-family: monospace;
    font-size: 14px;
    border: 1px solid var(--border, #ddd);
    border-radius: 6px;
    resize: vertical;
}
.section-desc { color: var(--text-gray, #666); margin-bottom: 20px; }
.save-status { margin-left: 12px; color: var(--text-gray); }

/* 多端适配：在手机和平板上优化高度和间距 */
@media (max-width: 768px) {
    .postcodes-textarea {
        min-height: 220px;
        font-size: 13px;
        padding: 10px;
    }
}

@media (max-width: 480px) {
    .postcodes-textarea {
        min-height: 200px;
        font-size: 12px;
        padding: 8px;
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
async function saveChannelPostcodes() {
    const statusEl = document.getElementById('saveStatus');
    statusEl.textContent = '保存中...';
    try {
        const response = await fetch('/api/channel-postcodes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                大件: document.getElementById('postcodes-dajian').value.trim(),
                纸箱: document.getElementById('postcodes-zhixiang').value.trim()
            })
        });
        const result = await response.json();
        if (result.success) {
            statusEl.textContent = '已保存';
            statusEl.style.color = 'green';
        } else {
            statusEl.textContent = result.message || '保存失败';
            statusEl.style.color = 'red';
        }
    } catch (e) {
        statusEl.textContent = '请求失败';
        statusEl.style.color = 'red';
    }
    setTimeout(function() { statusEl.textContent = ''; }, 3000);
}
</script>
{% endblock %}
