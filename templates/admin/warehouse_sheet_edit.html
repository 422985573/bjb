{% extends 'base.html' %}

{% block title %}编辑: {{ sheet_name }} - 报价网站{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ static_with_version('vendor/wangeditor/style.css') }}">
<style>
.wse-page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}
.wse-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
}
.wse-header h2 {
    font-size: 18px;
    color: #0f172a;
    margin: 0;
}
.wse-back {
    font-size: 13px;
    color: #2563eb;
    text-decoration: none;
}
.wse-back:hover { text-decoration: underline; }

.wse-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
}
.wse-save-btn {
    padding: 8px 24px;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
}
.wse-save-btn:hover { background: #1d4ed8; }
.wse-save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.wse-result {
    font-size: 13px;
    font-weight: 600;
}
.wse-result.ok { color: #16a34a; }
.wse-result.error { color: #dc2626; }

.wse-search {
    padding: 7px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 13px;
    width: 200px;
}
.wse-search:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
}

/* Adjust row */
.wse-adjust-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
}
.wse-adjust-group {
    display: flex;
    align-items: center;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    overflow: hidden;
}
.wse-adjust-step {
    width: 32px;
    height: 34px;
    border: none;
    background: #f1f5f9;
    color: #334155;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
}
.wse-adjust-step:hover { background: #e2e8f0; }
.wse-adjust-step:active { background: #cbd5e1; }
.wse-adjust-input {
    width: 70px;
    padding: 7px 4px;
    border: none;
    border-left: 1px solid #e2e8f0;
    border-right: 1px solid #e2e8f0;
    font-size: 13px;
    text-align: center;
    -moz-appearance: textfield;
}
.wse-adjust-input::-webkit-inner-spin-button,
.wse-adjust-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.wse-adjust-input:focus {
    outline: none;
    background: #eff6ff;
}
.wse-adjust-pct {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
}
.wse-adjust-btn {
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #f59e0b;
    color: #fff;
}
.wse-adjust-btn:hover { background: #d97706; }
.wse-adjust-result {
    font-size: 11px;
    color: #16a34a;
    font-weight: 600;
}
.wse-adjust-result.error { color: #dc2626; }

/* Grouped table */
.wse-group-header td {
    background: #eff6ff;
    font-weight: 700;
    font-size: 13px;
    color: #1e40af;
    padding: 10px 14px;
    border-left: 3px solid #2563eb;
    border-bottom: 1px solid #dbeafe;
}
.wse-group-cell {
    vertical-align: middle;
    font-weight: 700;
    font-size: 13px;
    color: #1e40af;
    background: #f8fafc;
    text-align: center;
    border-right: 2px solid #dbeafe;
}
.wse-group-add td {
    padding: 6px;
    text-align: center;
    border-bottom: 2px solid #e2e8f0;
}
.wse-group-add button {
    font-size: 11px;
    color: #64748b;
    background: none;
    border: 1px dashed #cbd5e1;
    border-radius: 4px;
    padding: 4px 12px;
    cursor: pointer;
}
.wse-group-add button:hover {
    border-color: #2563eb;
    color: #2563eb;
}

/* Section */
.wse-section {
    margin-bottom: 24px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 16px;
}
.wse-section-title {
    font-size: 14px;
    font-weight: 700;
    color: #1e40af;
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #dbeafe;
}
.wse-section-title-input {
    display: block;
    width: 100%;
    font-size: 14px;
    font-weight: 700;
    color: #1e40af;
    margin: 0 0 12px;
    padding: 4px 6px 8px;
    border: none;
    border-bottom: 1px dashed #93c5fd;
    background: transparent;
    box-sizing: border-box;
    font-family: inherit;
}
.wse-section-title-input:focus {
    outline: none;
    background: #eff6ff;
    border-bottom-color: #2563eb;
}
.wse-section-title-input::placeholder {
    color: #cbd5e1;
    font-weight: 400;
}
.wse-section-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 0 0 12px;
}
.wse-section-head .wse-section-title-input {
    flex: 1;
    margin: 0;
}
.wse-section-del-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #dc2626;
    background: #fff;
    border: 1px solid #fecaca;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
}
.wse-section-del-btn:hover {
    background: #fee2e2;
    border-color: #dc2626;
}
.wse-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}
.wse-table {
    border-collapse: collapse;
    font-size: 13px;
    width: 100%;
}
.wse-table th, .wse-table td {
    border: 1px solid #e2e8f0;
    padding: 0;
}
.wse-table th {
    background: #f1f5f9;
    padding: 6px 8px;
    font-size: 12px;
    color: #334155;
}
.wse-table input {
    width: 100%;
    min-width: 60px;
    padding: 5px 7px;
    border: none;
    font-size: 12px;
    background: transparent;
    box-sizing: border-box;
}
.wse-table input:focus {
    outline: none;
    background: #eff6ff;
}
.wse-table .wse-row-actions {
    width: 36px;
    text-align: center;
    padding: 4px;
}
.wse-del-btn {
    background: none;
    border: none;
    color: #dc2626;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
}
.wse-del-btn:hover { background: #fee2e2; }
.wse-add-row-btn {
    margin-top: 8px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px dashed #cbd5e1;
    border-radius: 6px;
    background: #fff;
    color: #64748b;
    cursor: pointer;
}
.wse-add-row-btn:hover { border-color: #2563eb; color: #2563eb; }

/* Pagination */
.wse-pager {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    color: #64748b;
}
.wse-pager-btn {
    padding: 5px 12px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    background: #fff;
    color: #334155;
    cursor: pointer;
    font-size: 13px;
}
.wse-pager-btn:hover { background: #f1f5f9; }
.wse-pager-btn:disabled { opacity: 0.4; cursor: default; }
.wse-pager-info { font-size: 12px; color: #94a3b8; }

/* Loading */
.wse-loading {
    text-align: center;
    padding: 60px;
    color: #64748b;
    font-size: 14px;
}
.wse-adjust-col {
    padding: 7px 10px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    font-size: 12px;
    color: #334155;
    background: #fff;
    max-width: 160px;
}
.wse-adjust-col:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
}
.wse-table thead th {
    position: sticky;
    top: 0;
    z-index: 1;
}

@media (max-width: 768px) {
    .wse-page { padding: 12px; }
    .wse-toolbar { flex-direction: column; align-items: stretch; }
    .wse-adjust-row { margin-left: 0; }
    .wse-table input { min-width: 50px; padding: 4px 5px; font-size: 11px; }
}
.wse-richtext-toolbar {
    border: 1px solid #e2e8f0;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #f8fafc;
}
.wse-richtext-editor {
    border: 1px solid #e2e8f0;
    border-radius: 0 0 6px 6px;
    min-height: 200px;
    max-height: 600px;
    overflow-y: auto;
}
/* 覆盖 wangEditor 默认 p{margin:15px 0}，与前端 .wh-richtext p 一致，
   避免对某行加粗/改色时，该行被拆成独立段落导致上下出现空行。 */
.wse-richtext-editor .w-e-text-container [data-slate-editor] p {
    margin: 4px 0;
    line-height: 1.6;
}
.wse-richtext-editor .w-e-text-container [data-slate-editor] h1,
.wse-richtext-editor .w-e-text-container [data-slate-editor] h2,
.wse-richtext-editor .w-e-text-container [data-slate-editor] h3,
.wse-richtext-editor .w-e-text-container [data-slate-editor] h4,
.wse-richtext-editor .w-e-text-container [data-slate-editor] h5 {
    margin: 8px 0;
}

.wse-note-merged-row td:first-child {
    background: #fffbeb;
}
.wse-note-merged-input {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #fde68a;
    border-radius: 4px;
    font-size: 12px;
    background: #fff;
    color: #92400e;
    box-sizing: border-box;
    font-family: inherit;
}
.wse-note-merged-input:focus {
    outline: none;
    border-color: #f59e0b;
    background: #fff7ed;
}
.wse-add-row-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 6px;
}
.wse-add-note-row-btn {
    border-color: #fde68a !important;
    color: #b45309 !important;
}
.wse-add-note-row-btn:hover {
    border-color: #f59e0b !important;
    background: #fffbeb !important;
}

.wse-group-cell input {
    width: 100%;
    padding: 5px 7px;
    border: none;
    font-size: 12px;
    background: transparent;
    text-align: center;
    font-weight: 700;
    color: #1e40af;
    box-sizing: border-box;
}
.wse-group-cell input:focus {
    outline: none;
    background: #eff6ff;
}
</style>
{% endblock %}

{% block content %}
<div class="wse-page">
    <div class="wse-header">
        <a href="javascript:history.back()" class="wse-back">&larr; 返回</a>
        <h2>{{ sheet_name }}</h2>
    </div>
    <div class="wse-toolbar">
        <button type="button" class="wse-save-btn" id="wseSaveBtn" onclick="wseDoSave()">保存</button>
        <span class="wse-result" id="wseResult"></span>
    </div>
    <div id="wseContent">
        <div class="wse-loading">加载中...</div>
    </div>
</div>

<script src="{{ static_with_version('vendor/wangeditor/index.js') }}"></script>
<script>
(function() {
  'use strict';

  var SHEET_KEY = '{{ sheet_key }}';
  var PAGE_SIZE = {{ 50 if is_large else 0 }};
  var sheetData = null;
  var pageNums = {};
  var searchTerm = '';

  function init() {
    fetch('/api/warehouse-sheet/' + encodeURIComponent(SHEET_KEY))
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (!res.success) {
          document.getElementById('wseContent').innerHTML = '<p style="color:#dc2626;">加载失败</p>';
          return;
        }
        sheetData = res.data;
        (sheetData.sections || []).forEach(function(s, i) { s._oidx = i; });
        render();
      })
      .catch(function() {
        document.getElementById('wseContent').innerHTML = '<p style="color:#dc2626;">网络错误</p>';
      });
  }

  var rtEditors = {};

  function cleanRichtextHtml(html) {
    if (!html) return '';
    var prev;
    do {
      prev = html;
      html = html.replace(/<p[^>]*>(?:\s|&nbsp;|&#160;|&#xA0;| |​|﻿|<br\s*\/?>)*<\/p>/gi, '');
    } while (html !== prev);
    html = html.replace(/<p([^>]*)>\s*<br\s*\/?>/gi, '<p$1>');
    html = html.replace(/<br\s*\/?>\s*<\/p>/gi, '</p>');
    return html;
  }

  // wangEditor 对 <br> 分隔的整段文本不友好：整段被视作一个 <p>，
  // 对其中一行加粗/改色时 Slate 会强制拆段，造成视觉上多出空行。
  // 这里把"无 <p> 包裹、用 <br> 分隔"的旧数据提前转成多个 <p>，规避此问题。
  function brToParagraphs(html) {
    if (!html) return '';
    if (/<p[\s>]/i.test(html)) return html;
    var parts = html.split(/<br\s*\/?>/i);
    var out = parts.map(function(p) {
      p = p.replace(/^\s+|\s+$/g, '');
      return p ? '<p>' + p + '</p>' : '';
    }).filter(Boolean).join('');
    return out || html;
  }

  function render() {
    var sections = sheetData.sections || [];
    var html = '';
    rtEditors = {};
    sections.forEach(function(sec, si) {
      html += renderSection(sec, si);
    });
    document.getElementById('wseContent').innerHTML = html;
    bindEvents();
    initRichTextEditors();
  }

  function initRichTextEditors() {
    var wang = window.wangEditor;
    if (!wang) return;
    (sheetData.sections || []).forEach(function(sec, si) {
      if (sec.type !== 'richtext') return;
      var toolbarEl = document.getElementById('wseRtToolbar' + si);
      var editorEl = document.getElementById('wseRtEditor' + si);
      if (!toolbarEl || !editorEl) return;

      var initialHtml = cleanRichtextHtml(brToParagraphs(sec.html || ''));
      sheetData.sections[si].html = initialHtml;

      var editor = wang.createEditor({
        selector: '#wseRtEditor' + si,
        html: initialHtml,
        config: {
          placeholder: '请输入内容…',
          onChange: function(ed) {
            sheetData.sections[si].html = cleanRichtextHtml(ed.getHtml());
          }
        },
        mode: 'default'
      });
      wang.createToolbar({
        editor: editor,
        selector: '#wseRtToolbar' + si,
        config: {
          toolbarKeys: ['headerSelect', 'bold', 'color', 'bgColor', 'fontSize', '|', 'bulletedList', 'numberedList', '|', 'undo', 'redo']
        },
        mode: 'default'
      });
      rtEditors[si] = editor;
    });
  }

  function renderSectionTitle(sec, si) {
    var t = sec.title || '';
    var h = '<div class="wse-section-head">';
    h += '<input type="text" class="wse-section-title-input" value="' + escAttr(String(t)) + '" data-title-si="' + si + '" placeholder="标题（留空则不显示）" onchange="wseTitleChange(this)">';
    h += '<button type="button" class="wse-section-del-btn" onclick="wseDelSection(' + si + ')" title="删除整个块">删除此块</button>';
    h += '</div>';
    return h;
  }

  window.wseTitleChange = function(inp) {
    var si = parseInt(inp.dataset.titleSi);
    var sec = sheetData.sections[si];
    if (!sec) return;
    sec.title = inp.value.trim();
  };

  window.wseDelSection = function(si) {
    syncInputsToData();
    var sec = sheetData.sections[si];
    if (!sec) return;
    var label = sec.title ? ('「' + sec.title + '」') : '（未命名）';
    if (!confirm('确认删除整个块' + label + '？保存后不可恢复。')) return;
    sheetData.sections.splice(si, 1);
    render();
  };

  function renderSection(sec, si) {
    var rows = sec.rows || [];
    var h = '<div class="wse-section" data-si="' + si + '"';

    if (sec.type === 'richtext') {
      h += ' data-type="richtext">';
      h += renderSectionTitle(sec, si);
      h += '<div class="wse-richtext-toolbar" id="wseRtToolbar' + si + '"></div>';
      h += '<div class="wse-richtext-editor" id="wseRtEditor' + si + '"></div>';
      h += '</div>';
      return h;
    }

    var cols = 0;
    var headers = sec.headers || [];
    if (sec.type === 'zone_table') return '';
    rows.forEach(function(r) { if (r.length > cols) cols = r.length; });
    if (headers.length > cols) cols = headers.length;
    if (!rows.length && !headers.length) return '';

    h += ' data-cols="' + cols + '">';
    h += renderSectionTitle(sec, si);

    if (sec.type === 'price_table') {
      h += '<div class="wse-adjust-row" data-si="' + si + '">';
      h += '<select class="wse-adjust-col" id="wseAdjustCol' + si + '">';
      h += '<option value="all">所有价格列</option>';
      var seen = {};
      for (var ci = 0; ci < headers.length; ci++) {
        var hName = headers[ci];
        if (!hName || seen[hName]) continue;
        var hasNum = false;
        rows.forEach(function(row) { if (hasNum) return; var v = ci < row.length ? row[ci] : ''; if (v !== '' && v !== null) { var n = parseFloat(v); if (!isNaN(n) && String(n) === String(v).toString().trim()) hasNum = true; } });
        if (hasNum) { seen[hName] = true; h += '<option value="' + escAttr(hName) + '">' + esc(hName) + '</option>'; }
      }
      h += '</select>';
      h += '<div class="wse-adjust-group">';
      h += '<button type="button" class="wse-adjust-step" onclick="wseStepAdjust(-1,' + si + ')">−</button>';
      h += '<input type="number" class="wse-adjust-input" id="wseAdjustInput' + si + '" placeholder="0" step="1">';
      h += '<button type="button" class="wse-adjust-step" onclick="wseStepAdjust(1,' + si + ')">+</button>';
      h += '</div>';
      h += '<span class="wse-adjust-pct">%</span>';
      h += '<button type="button" class="wse-adjust-btn" onclick="wseDoLocalAdjust(' + si + ')">调价</button>';
      h += '<span class="wse-adjust-result" id="wseAdjustResult' + si + '"></span>';
      h += '</div>';
    }

    var usePaging = PAGE_SIZE > 0 && rows.length > PAGE_SIZE && sec.type === 'zone_table';
    if (usePaging) {
      h += '<div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;">';
      h += '<input type="text" class="wse-search" placeholder="搜索..." data-si="' + si + '" oninput="wseSearch(this)">';
      h += '<span class="wse-pager-info" id="wseCount' + si + '">' + rows.length + ' 行</span>';
      h += '</div>';
    }

    h += renderTable(sec, si, cols, usePaging);

    h += '</div>';
    return h;
  }

  function canGroupByCol0(rows) {
    if (!rows.length) return false;
    var first = rows[0][0];
    if (first === '' || first === null || first === undefined) return false;
    var count = 0;
    for (var i = 0; i < rows.length; i++) {
      if (rows[i][0] !== '' && rows[i][0] !== null && rows[i][0] !== undefined) count++;
    }
    return count >= 1 && count <= rows.length / 2;
  }

  function isMarkerRow(row) {
    if (!row[0] || row[0] === '') return false;
    for (var i = 1; i < row.length; i++) {
      if (row[i] !== '' && row[i] !== null && row[i] !== undefined) return false;
    }
    return true;
  }

  function canGroupByMarkerRows(rows) {
    if (rows.length < 3) return false;
    var markers = 0;
    for (var i = 0; i < rows.length; i++) {
      if (!isMarkerRow(rows[i])) continue;
      markers++;
      var next = rows[i + 1];
      if (!next) return false;
      var nextC0 = wseCellValue(next[0]);
      if (nextC0 !== '' && nextC0 !== null && nextC0 !== undefined) return false;
      var nextFilled = 0;
      for (var j = 0; j < next.length; j++) {
        var v = wseCellValue(next[j]);
        if (v !== '' && v !== null && v !== undefined) nextFilled++;
      }
      if (nextFilled < 2) return false;
    }
    return markers >= 2 && markers <= rows.length / 3;
  }

  function isNoteRowForEdit(row, cols) {
    if (cols < 2) return false;
    var c0 = wseCellValue(row[0]);
    if (c0 !== '' && c0 !== null && c0 !== undefined) return false;
    var filled = 0;
    for (var i = 0; i < row.length; i++) {
      var v = wseCellValue(row[i]);
      if (v !== '' && v !== null && v !== undefined) filled++;
    }
    return filled === 1;
  }

  function splitNotesAndData(rows, cols) {
    var dataIdx = [], noteIdx = [];
    rows.forEach(function(r, i) {
      if (isNoteRowForEdit(r, cols)) noteIdx.push(i);
      else dataIdx.push(i);
    });
    return { dataIdx: dataIdx, noteIdx: noteIdx };
  }

  function buildCol0Groups(rows, dataIdx) {
    var groups = [];
    var cur = null;
    for (var i = 0; i < dataIdx.length; i++) {
      var ri = dataIdx[i];
      var v = wseCellValue(rows[ri][0]);
      if (v !== '' && v !== null && v !== undefined) {
        cur = { col0: v, indices: [ri] };
        groups.push(cur);
      } else if (cur) {
        cur.indices.push(ri);
      } else {
        cur = { col0: '', indices: [ri] };
        groups.push(cur);
      }
    }
    return groups;
  }

  function renderPriceTable(sec, si, cols) {
    var rows = sec.rows || [];
    var headers = sec.headers || [];
    var split = splitNotesAndData(rows, cols);
    var dataIdx = split.dataIdx;

  function wseCellValue(c) {
    if (c && typeof c === 'object' && !Array.isArray(c)) {
      return c.v != null ? c.v : (c.text != null ? c.text : '');
    }
    return c;
  }
  function wseCellColspan(c) {
    if (c && typeof c === 'object' && !Array.isArray(c)) {
      return c.cs || c.colspan || 1;
    }
    return 1;
  }
  function wseBuildColspanCover(rows) {
    var covered = {};
    for (var ri = 0; ri < rows.length; ri++) {
      for (var ci = 0; ci < rows[ri].length; ci++) {
        var cs = wseCellColspan(rows[ri][ci]);
        if (cs > 1) {
          for (var k = 1; k < cs; k++) covered[ri + '_' + (ci + k)] = true;
        }
      }
    }
    return covered;
  }

  function wseIsFullSpanRow(row, colCount) {
    if (colCount < 5) return false;
    var filled = 0;
    var leadingEmpty = 0;
    var seenFilled = false;
    for (var i = 0; i < row.length; i++) {
      var v = wseCellValue(row[i]);
      if (v !== '' && v !== null && v !== undefined) {
        seenFilled = true;
        filled += wseCellColspan(row[i]);
      } else if (!seenFilled) {
        leadingEmpty++;
      }
    }
    if (leadingEmpty > 1) return false;
    return filled > 0 && filled * 3 <= colCount;
  }

  function wseBuildRowspanMap(rows, cols) {
    var map = {};
    if (!rows.length) return map;
    var covered = wseBuildColspanCover(rows);
    for (var ci = 0; ci < cols; ci++) {
      var hasGrouping = false;
      for (var ri = 1; ri < rows.length; ri++) {
        if (covered[ri + '_' + ci]) continue;
        var v = wseCellValue(rows[ri][ci]);
        if (v === '' || v === null || v === undefined) {
          var prevV = wseCellValue(rows[ri - 1][ci]);
          if (prevV !== '' && prevV !== null && prevV !== undefined) {
            hasGrouping = true;
            break;
          }
        }
      }
      if (!hasGrouping) continue;

      var anchor = -1;
      for (var ri2 = 0; ri2 < rows.length; ri2++) {
        if (covered[ri2 + '_' + ci]) {
          if (anchor >= 0) map[anchor + '_' + ci] = ri2 - anchor;
          anchor = -1;
          continue;
        }
        var v2 = wseCellValue(rows[ri2][ci]);
        var isEmpty = (v2 === '' || v2 === null || v2 === undefined);
        if (wseIsFullSpanRow(rows[ri2], cols)) {
          if (anchor >= 0) map[anchor + '_' + ci] = ri2 - anchor;
          anchor = -1;
          continue;
        }
        if (!isEmpty) {
          if (anchor >= 0) map[anchor + '_' + ci] = ri2 - anchor;
          anchor = ri2;
          map[ri2 + '_' + ci] = 1;
        } else {
          if (anchor >= 0) map[ri2 + '_' + ci] = 0;
        }
      }
      if (anchor >= 0) map[anchor + '_' + ci] = rows.length - anchor;
    }
    return map;
  }

  function wseHasRowspanGroups(rspMap) {
    for (var k in rspMap) {
      if (rspMap[k] > 1) return true;
    }
    return false;
  }

  function renderTable(sec, si, cols, usePaging) {
    var rows = sec.rows || [];

    if (canGroupByMarkerRows(rows)) {
      return renderMarkerGroupedTable(sec, si, cols);
    }

    if (sec.type !== 'zone_table') {
      return renderPriceTable(sec, si, cols);
    }

    var display = rows;

    if (usePaging && searchTerm) {
      display = [];
      var term = searchTerm;
      for (var i = 0; i < rows.length; i++) {
        for (var j = 0; j < rows[i].length; j++) {
          if (String(rows[i][j]).toLowerCase().indexOf(term) >= 0) {
            display.push({row: rows[i], idx: i});
            break;
          }
        }
      }
    } else if (usePaging) {
      display = rows.map(function(r, i) { return {row: r, idx: i}; });
    }

    var pageRows, totalPages = 1, page = pageNums[si] || 1;
    if (usePaging) {
      totalPages = Math.max(1, Math.ceil(display.length / PAGE_SIZE));
      if (page > totalPages) page = totalPages;
      pageNums[si] = page;
      var start = (page - 1) * PAGE_SIZE;
      pageRows = display.slice(start, start + PAGE_SIZE);
    } else {
      pageRows = rows.map(function(r, i) { return {row: r, idx: i}; });
    }

    var h = '<div class="wse-table-wrap"><table class="wse-table">';
    var headers = sec.headers || [];
    if (headers.length) {
      h += '<thead><tr>';
      for (var hi = 0; hi < headers.length; hi++) {
        h += '<th>' + esc(headers[hi] || '') + '</th>';
      }
      h += '<th></th>';
      h += '</tr></thead>';
    }
    h += '<tbody>';
    var coverMap = wseBuildColspanCover(rows);
    var rspMap = (sec.type !== 'price_table' && sec.type !== 'zone_table') ? wseBuildRowspanMap(rows, cols) : {};
    pageRows.forEach(function(item) {
      var row = item.row;
      var ri = item.idx;
      h += '<tr data-ri="' + ri + '">';
      var filled = [];
      var leadingEmpty = 0;
      var seenFilled = false;
      for (var k = 0; k < cols; k++) {
        var cellRaw = k < row.length ? row[k] : '';
        var v = wseCellValue(cellRaw);
        if (v !== '' && v !== null && v !== undefined) {
          filled.push(k);
          seenFilled = true;
        } else if (!seenFilled) {
          leadingEmpty++;
        }
      }
      var isNoteRow = cols >= 4 && filled.length > 0 && filled.length * 2 <= cols && leadingEmpty <= 1;
      if (isNoteRow) {
        var text = filled.map(function(fi) { return String(wseCellValue(row[fi])); }).join('  ');
        h += '<td colspan="' + cols + '"><input type="text" value="' + escAttr(text) + '" data-si="' + si + '" data-ri="' + ri + '" data-ci="' + filled[0] + '" data-merged="1" style="min-width:100%"></td>';
      } else {
        var ci = 0;
        while (ci < cols) {
          if (coverMap[ri + '_' + ci]) { ci++; continue; }
          var rsp = rspMap[ri + '_' + ci];
          if (rsp === 0) { ci++; continue; }
          var cellRaw2 = ci < row.length ? row[ci] : '';
          var val = wseCellValue(cellRaw2);
          if (val === null || val === undefined) val = '';
          var cs = wseCellColspan(cellRaw2);
          var attrs = '';
          if (cs > 1) attrs += ' colspan="' + cs + '"';
          if (rsp > 1) attrs += ' rowspan="' + rsp + '"';
          var dataAttrs = '';
          if (cs > 1) dataAttrs += ' data-cs="' + cs + '"';
          h += '<td' + attrs + '><input type="text" value="' + escAttr(String(val)) + '" data-si="' + si + '" data-ri="' + ri + '" data-ci="' + ci + '"' + dataAttrs + '></td>';
          ci += cs;
        }
      }
      h += '<td class="wse-row-actions"><button type="button" class="wse-del-btn" onclick="wseDelRow(this,' + si + ',' + ri + ')" title="删除行">&times;</button></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';

    if (usePaging && totalPages > 1) {
      h += '<div class="wse-pager">';

      h += '<span>' + page + ' / ' + totalPages + '</span>';

      h += '<span class="wse-pager-info">共 ' + display.length + ' 行</span>';

  function syncInputsToData() {

      if (inp.dataset.merged) {
        for (var i = 0; i < row.length; i++) row[i] = '';

        return;

      while (row.length <= ci) row.push('');
      var cs = parseInt(inp.dataset.cs) || 1;
      if (cs > 1) {
        row[ci] = {v: v, cs: cs};
        return;
      }
      var num = parseFloat(v);
      if (v !== '' && !isNaN(num) && String(num) === v.trim()) {
        row[ci] = num;

        row[ci] = v;

    var sec = sheetData.sections[si];
    if (!sec) return;
    var factor = 1 + pct / 100;
    var count = 0;
    var headers = sec.headers || [];
    var targetCols = {};
    if (colName === 'all') {
      for (var ci = 0; ci < (headers.length || 999); ci++) targetCols[ci] = true;
    } else {
      for (var ci = 0; ci < headers.length; ci++) {
        if (headers[ci] === colName) targetCols[ci] = true;
      }
    }
    (sec.rows || []).forEach(function(row) {
      for (var ci = 0; ci < row.length; ci++) {
        if (!targetCols[ci]) continue;
        if (row[ci] === '' || row[ci] === null) continue;
        var n = parseFloat(row[ci]);
        if (!isNaN(n) && String(n) === String(row[ci]).trim()) {
          var nv = Math.round(n * factor * 100) / 100;
          row[ci] = nv % 1 === 0 ? parseInt(nv) : nv;
          count++;
        }
      }
    });

    rerenderSection(si);
    result = document.getElementById('wseAdjustResult' + si);
    if (result) { result.className = 'wse-adjust-result'; result.textContent = '已调整 ' + label + ' ' + count + ' 个数值（未保存）'; }
  };

  window.wseDoSave = function() {
    syncInputsToData();
    // 确保所有富文本编辑器的最新内容已同步并清洗
    Object.keys(rtEditors).forEach(function(si) {
      var ed = rtEditors[si];
      if (ed && sheetData.sections[si]) {
        sheetData.sections[si].html = cleanRichtextHtml(ed.getHtml());
      }
    });
    var result = document.getElementById('wseResult');
    var saveBtn = document.getElementById('wseSaveBtn');
    var sections = sheetData.sections.map(function(sec) {
      if (sec.type === 'richtext') {
        return {type: 'richtext', html: cleanRichtextHtml(sec.html || ''), title: sec.title || '', _oidx: sec._oidx};
      }
      return {rows: sec.rows || [], title: sec.title || '', _oidx: sec._oidx};
    });

    saveBtn.disabled = true;
    result.className = 'wse-result';
    result.textContent = '保存中...';

    fetch('/api/warehouse-sheet/' + encodeURIComponent(SHEET_KEY) + '/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({sections: sections})
    })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        saveBtn.disabled = false;
        if (res.success) {
          result.className = 'wse-result ok';
          result.textContent = '已保存';
          // 磁盘 sections 已按本次提交顺序重建，重新对齐 _oidx，
          // 使后续删除/保存的索引引用保持正确（无需刷新页面）。
          (sheetData.sections || []).forEach(function(s, i) { s._oidx = i; });
        } else {
          result.className = 'wse-result error';
          result.textContent = res.message || '保存失败';
        }
      })
      .catch(function() {
        saveBtn.disabled = false;
        result.className = 'wse-result error';
        result.textContent = '网络错误';
      });
  };

  function esc(v) {
    var d = document.createElement('div');
    d.textContent = v;
    return d.innerHTML;
  }
  function escAttr(v) {
    return v.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
})();
</script>
{% endblock %}
